#####################################################################
##                  Bed Mesh Calibration
#####################################################################
[bed_mesh]
speed: 300                       # Calibration speed
zero_reference_position: 150,150
horizontal_move_z: 3            # Z-axis movement speed
adaptive_margin: 10
mesh_min: 20,35                  # Minimum calibration point coordinates x, y 0 , 0
mesh_max: 280,270                # Maximum calibration point coordinates x, y 300, 293
probe_count: 20,20              # Number of sampling points (7X7 is 49 points)
mesh_pps: 0,0                    # Additional sampling points

#fade_start: 1.0
#fade_end: 10.0
#fade_target: 0

